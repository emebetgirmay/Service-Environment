user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" uat="$upstream_header_time" urt="$upstream_response_time" '
                    'trace_id="$clean_x_request_id"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Map incoming request/trace IDs to a consolidated clean ID, defaulting to nginx request_id
    map $http_x_request_id $clean_x_request_id {
        default $http_x_request_id;
        ""      $clean_x_trace_id;
    }

    map $http_x_trace_id $clean_x_trace_id {
        default $http_x_trace_id;
        ""      $request_id;
    }

    server {
        listen 80;
        server_name _;

        location / {
            resolver 127.0.0.11 valid=5s;
            set $upstream_service_a http://service-a:3001;
            proxy_pass $upstream_service_a;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Forward consolidated trace ID in both standard header fields
            proxy_set_header X-Request-ID $clean_x_request_id;
            proxy_set_header X-Trace-ID $clean_x_request_id;
        }
    }
}
